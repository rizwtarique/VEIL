<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veil</title>
    <style>
      * { box-sizing: border-box; }
      body {
        width: 340px;
        margin: 0;
        background: #060a10;
        color: #eaf8f5;
        font: 13px Inter, ui-sans-serif, system-ui, sans-serif;
      }
      main { padding: 20px; }
      header { display: flex; align-items: center; gap: 12px; }
      .mark {
        display: grid; width: 40px; height: 40px; place-items: center;
        border: 1px solid rgba(25,230,199,.28); border-radius: 12px;
        background: rgba(25,230,199,.08); color: #19e6c7; font-size: 20px;
      }
      h1 { margin: 0; font-size: 16px; letter-spacing: .22em; }
      .eyebrow { margin: 4px 0 0; color: #637181; font-size: 9px; letter-spacing: .16em; text-transform: uppercase; }
      .status {
        display: flex; align-items: center; justify-content: space-between;
        margin: 20px 0; padding: 13px; border: 1px solid #17212c;
        border-radius: 12px; background: #0b111a;
      }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: #19e6c7; box-shadow: 0 0 10px #19e6c7; }
      .status-copy { display: flex; align-items: center; gap: 8px; color: #a9b7c4; }
      .sites { color: #5e6b79; font-size: 10px; }
      label { display: block; margin: 13px 0 6px; color: #7f8d9d; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
      input {
        width: 100%; border: 1px solid #1a2733; border-radius: 9px;
        outline: 0; background: #080e16; color: #dbe9e7; padding: 10px 11px;
      }
      input:focus { border-color: rgba(25,230,199,.5); }
      button {
        width: 100%; margin-top: 16px; border: 0; border-radius: 9px;
        background: #19e6c7; color: #03110e; padding: 11px; cursor: pointer;
        font-weight: 700; letter-spacing: .06em;
      }
      #message { min-height: 16px; margin: 10px 0 0; color: #6e7d8b; font-size: 11px; text-align: center; }
      .privacy { margin: 18px 0 0; border-top: 1px solid #131c25; padding-top: 14px; color: #53606d; font-size: 10px; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="mark">V</div>
        <div>
          <h1>VEIL</h1>
          <p class="eyebrow">Prompt protection</p>
        </div>
      </header>
      <div class="status">
        <div class="status-copy"><span class="dot"></span><span>Protection active</span></div>
        <span class="sites">3 sites</span>
      </div>
      <form id="settings-form">
        <label for="supabase-url">Supabase URL</label>
        <input id="supabase-url" name="supabase-url" type="url" autocomplete="off" />
        <label for="supabase-key">Supabase anon key</label>
        <input id="supabase-key" name="supabase-key" type="password" autocomplete="off" />
        <button type="submit">SAVE CONNECTION</button>
        <p id="message"></p>
      </form>
      <p class="privacy">Detection runs locally. Only sanitized previews and finding labels are sent to Supabase.</p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
